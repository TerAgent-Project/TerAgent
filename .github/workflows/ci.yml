name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install httpx aiosqlite pytest pytest-asyncio

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

  kylin-v10-test:
    name: Test on Kylin V10 (National OS)
    runs-on: ubuntu-latest
    container:
      image: openkylin/openkylin:latest
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python and dependencies
        run: |
          apt-get update || yum install -y python3 python3-pip || true
          pip3 install --upgrade pip || pip install --upgrade pip || true
          pip3 install httpx aiosqlite pytest pytest-asyncio || pip install httpx aiosqlite pytest pytest-asyncio || true

      - name: Run native test script
        run: |
          chmod +x scripts/ci/native_test.sh
          bash scripts/ci/native_test.sh
