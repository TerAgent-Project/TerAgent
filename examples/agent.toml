# TerAgent 配置模板 — DeepSeek V4 / MiniMax M3 / GLM-5 深度适配
# 版本：v1.0 | 基于 design.md 设计方案

# =============================================================================
# DeepSeek V4 — Flash (轻量任务默认模型)
# =============================================================================
[drivers.openai_compatible.deepseek_v4_flash]
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-v4-flash"
compiler = "deepseek_v4"
compiler_variant = "flash"              # Flash 模式：极简 prompt，快速响应
max_context_tokens = 1_000_000          # V4 支持 1M 上下文
max_output_tokens = 384_000             # V4 最大 384K 输出
thinking_mode = "auto"                  # auto/deep/quick
cache_aware = true                      # 启用缓存感知（V4 缓存价格差 12x）

# =============================================================================
# DeepSeek V4 — Pro (复杂任务专用)
# =============================================================================
[drivers.openai_compatible.deepseek_v4_pro]
base_url = "https://api.deepseek.com"
api_key_env = "DEEPSEEK_API_KEY"
model = "deepseek-v4-pro"
compiler = "deepseek_v4"
compiler_variant = "pro"                # Pro 模式：完整 prompt + 推理引导
max_context_tokens = 1_000_000
max_output_tokens = 384_000
thinking_mode = "deep"                  # Pro 默认深度推理
cache_aware = true

# =============================================================================
# MiniMax M3 — 多模态模型
# =============================================================================
[drivers.openai_compatible.minimax_m3]
base_url = "https://api.minimaxi.com/v1"
api_key_env = "MINIMAX_API_KEY"
model = "minimax-m3"
compiler = "minimax_m3"
max_context_tokens = 1_000_000          # M3 支持 1M 上下文
max_output_tokens = 384_000
multimodal_enabled = true               # 启用多模态（图像+视频）
desktop_enabled = true                  # 启用桌面操作
msa_efficient = true                    # MSA 全文注入模式

# =============================================================================
# GLM-5 — 长程任务模型
# =============================================================================
[drivers.openai_compatible.glm_5]
base_url = "https://open.bigmodel.cn/api/paas/v4"
api_key_env = "GLM_API_KEY"
model = "glm-5"
compiler = "glm_5"
max_context_tokens = 200_000            # GLM-5 200K 上下文
max_output_tokens = 128_000
thinking_mode = "deep"                  # GLM-5 默认深度推理
long_horizon_enabled = true             # 启用长程任务模式（8小时自治）

# =============================================================================
# GLM-5.2 — 旗舰模型（1M 上下文 + 双思考模式）
# =============================================================================
[drivers.openai_compatible.glm_52]
base_url = "https://open.bigmodel.cn/api/paas/v4"
api_key_env = "GLM_API_KEY"
model = "glm-5.2"
compiler = "glm_52"
max_context_tokens = 1_000_000          # GLM-5.2 1M 上下文
max_output_tokens = 128_000
thinking_mode = "auto"                  # auto: Compiler 自动选择 High/Max
long_horizon_enabled = true             # 继承 GLM-5 的长程任务能力

# =============================================================================
# 执行流水线 — 多模型协同分配
# =============================================================================
[execution.pipeline]
# 设计阶段：V4-Pro（深度推理 + 完整系统提示）
design_driver = "openai_compatible.deepseek_v4_pro"

# 规划阶段：V4-Pro（结构化规划优化）
plan_driver = "openai_compatible.deepseek_v4_pro"

# 执行阶段：V4-Flash（快速代码生成 + 低成本）
execute_driver = "openai_compatible.deepseek_v4_flash"

# 审查阶段：GLM-5（深入审查 + 逻辑验证）
review_driver = "openai_compatible.glm_5"

# =============================================================================
# 智能路由配置 (Phase 3: ModelRouter)
# =============================================================================
[routing]
# 多模态内容 → 强制路由到 M3
multimodal_driver = "openai_compatible.minimax_m3"
# 桌面操作 → 强制路由到 M3
desktop_driver = "openai_compatible.minimax_m3"
# 长程任务 → 强制路由到 GLM-5
long_horizon_driver = "openai_compatible.glm_5"

# 月度预算控制
[routing.monthly_budget]
limit_cny = 500.0                          # 月度预算上限 ¥500
warning_threshold = 0.8                    # 80% 时告警
auto_downgrade = true                      # 超预算自动降级到 V4-Flash

# Pipeline 命名配置
[execution.pipeline.profiles.budget]
description = "极致性价比：所有阶段使用 V4-Flash"
design_driver = "openai_compatible.deepseek_v4_flash"
plan_driver = "openai_compatible.deepseek_v4_flash"
execute_driver = "openai_compatible.deepseek_v4_flash"
review_driver = "openai_compatible.deepseek_v4_flash"

[execution.pipeline.profiles.multimodal]
description = "多模态模式：所有阶段使用 M3"
design_driver = "openai_compatible.minimax_m3"
plan_driver = "openai_compatible.minimax_m3"
execute_driver = "openai_compatible.minimax_m3"
review_driver = "openai_compatible.minimax_m3"

[execution.pipeline.profiles.quality]
description = "质量优先：设计/审查用 V4-Pro，规划/执行用 GLM-5"
design_driver = "openai_compatible.deepseek_v4_pro"
plan_driver = "openai_compatible.glm_5"
execute_driver = "openai_compatible.glm_5"
review_driver = "openai_compatible.deepseek_v4_pro"

[execution.pipeline.profiles.long_horizon]
description = "长程任务：所有阶段使用 GLM-5（8h 自治模式）"
design_driver = "openai_compatible.glm_5"
plan_driver = "openai_compatible.glm_5"
execute_driver = "openai_compatible.glm_5"
review_driver = "openai_compatible.glm_5"

# =============================================================================
# 熔断器配置
# =============================================================================
[circuit_breaker.budget]
max_session_tokens = 10_000_000              # 单次会话最大 token 预算
warning_threshold = 0.7                       # 70% 时警告
critical_threshold = 0.9                      # 90% 时严重警告
enable_hard_limit = false                     # 是否硬性截断

[circuit_breaker.failure_breaker]
max_consecutive = 5                           # 最大连续失败次数
window_seconds = 300                          # 观察窗口 5 分钟

[circuit_breaker.latency_breaker]
warn_latency_ms = 30000                       # 延迟警告阈值 30s

[circuit_breaker.progress_detector]
stall_threshold = 10                          # 停滞检测阈值

# =============================================================================
# 上下文管理配置
# =============================================================================
[context_management]
model_token_limit = 128_000                   # 默认上下文窗口 128K
compaction_threshold = 0.8                    # 80% 时触发压缩
retain_count = 8                              # 压缩时保留最近 8 条消息
max_compacts = 5                              # 单会话最大压缩次数

# =============================================================================
# 权限配置
# =============================================================================
[permission]
mode = "default"                              # default/plan/bypass/accept_edits/auto
rules = {}                                    # 自定义规则（allow/deny 列表）

# =============================================================================
# 工具配置
# =============================================================================
[tools]
max_concurrent = 10                           # 最大并发工具数

# =============================================================================
# 流式配置
# =============================================================================
[streaming]
mode = "auto"                                 # auto/streaming/batch
max_concurrent = 10                           # 流式并发上限

# =============================================================================
# 会话配置
# =============================================================================
[session]
db_path = ".agent/sessions.db"                # SQLite 会话存储路径
enabled = true                                # 启用会话持久化

# =============================================================================
# 文件安全配置
# =============================================================================
[file_safety]
workspace_root = "."                          # 工作空间根目录
enable_2pc = true                             # 启用两阶段提交（原子写入）
max_file_size = 10_485_760                    # 单文件最大 10MB

# =============================================================================
# 模型降级配置
# =============================================================================
[model.fallback]
driver = "openai_compatible.deepseek_v4_flash"  # 降级到 V4-Flash
model = "deepseek-v4-flash"
